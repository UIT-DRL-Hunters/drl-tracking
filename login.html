<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - UIT ĐRL Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">

    <div class="login-container">
        <div class="login-header">
            <h2>🎓 UIT ĐRL</h2>
            <p>Hệ thống Quản lý Điểm Rèn Luyện</p>
        </div>
        
        <div class="login-form">
            <div class="input-group">
                <label>Mã số sinh viên (MSSV)</label>
                <input type="text" id="mssv" placeholder="VD: 2252xxxx" required>
            </div>
            
            <div class="input-group">
                <label>Mật khẩu</label>
                <input type="password" id="password" placeholder="Nhập mật khẩu" required>
            </div>
            
            <button class="btn-login" onclick="handleLogin()">ĐĂNG NHẬP</button>
            <p class="login-error" id="error-msg"></p>

            <div class="login-footer">
                Chưa có tài khoản? <a href="register.html">Đăng ký ngay</a>
            </div>
        </div>
    </div>

    <script>
        // Logic xử lý đăng nhập (Giả lập Frontend)
        // Logic xử lý đăng nhập gọi API Backend
        async function handleLogin() {
            const mssvInput = document.getElementById('mssv').value;
            const passInput = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');

            if(mssvInput === "" || passInput === "") {
                errorMsg.innerText = "❌ Vui lòng nhập đầy đủ MSSV và Mật khẩu!";
                return;
            }

            try {
                // Gửi request lên Backend
                const response = await fetch('http://localhost:3000/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ mssv: mssvInput, password: passInput })
                });

                const data = await response.json();

                if (data.success) {
                    // Đăng nhập thành công -> Lưu LocalStorage và chuyển trang
                    localStorage.setItem('uit_logged_in', 'true');
                    localStorage.setItem('uit_mssv', data.user.mssv); 
                    window.location.href = "index.html";
                } else {
                    // Sai mật khẩu hoặc lỗi từ Backend
                    errorMsg.innerText = "❌ " + data.message;
                }
            } catch (error) {
                console.error("Lỗi kết nối server:", error);
                errorMsg.innerText = "❌ Không thể kết nối đến máy chủ. Hãy đảm bảo Server đang chạy!";
            }
        }
    </script>
</body>
</html>
